<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Sfondo gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sfondo principale -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Icona cervello/AI stilizzata -->
  <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2v2c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2v-2c-1.1 0-2-.9-2-2v-2c0-1.1.9-2 2-2z" fill="url(#brain)" stroke="white" stroke-width="1"/>
  
  <!-- Circuiti/connessioni neurali -->
  <circle cx="10" cy="14" r="1" fill="white" opacity="0.8"/>
  <circle cx="14" cy="12" r="1" fill="white" opacity="0.8"/>
  <circle cx="18" cy="16" r="1" fill="white" opacity="0.8"/>
  
  <!-- Linee di connessione -->
  <path d="M10 14L14 12M14 12L18 16" stroke="white" stroke-width="0.5" opacity="0.6" fill="none"/>
  
  <!-- Icona libro/studio in basso -->
  <rect x="6" y="22" width="8" height="6" rx="1" fill="white" opacity="0.9"/>
  <rect x="7" y="23" width="6" height="1" fill="#6C5CE7" opacity="0.7"/>
  <rect x="7" y="25" width="4" height="1" fill="#6C5CE7" opacity="0.5"/>
  
  <!-- Indicatore progresso -->
  <rect x="16" y="22" width="10" height="2" rx="1" fill="white" opacity="0.7"/>
  <rect x="17" y="23" width="6" height="0.5" fill="#00B894" opacity="0.9"/>
</svg>